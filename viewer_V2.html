<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Model Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
    .hint {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #ccc;
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 6px 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<model-viewer 
  src="model_V2.glb" 
  alt="3D model"
  auto-rotate
  camera-controls
  exposure="1"
  shadow-intensity="1"
  ar
>
</model-viewer>

<div class="hint">
  Drag = rotate | Scroll = zoom | Right click = pan
</div>

</body>
</html>
